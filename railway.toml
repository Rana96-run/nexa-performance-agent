[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Railway reads the Procfile for process types.
# Two services are expected in this project:
#
#   nexa-web    → runs the Procfile "web" command  (Flask + webhook)
#   nexa-worker → runs the Procfile "worker" command (schedulers + Slack listener)
#
# Set these in Railway dashboard:
#   nexa-web    → Start Command: gunicorn "reports.app:app" --bind 0.0.0.0:$PORT --workers 2 --timeout 120
#   nexa-worker → Start Command: python worker.py
