[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Single service: nexa-web
# Start Command: python app_server.py
#
# app_server.py runs everything in one process:
#   - Flask (reports + webhooks) on $PORT
#   - operational_scheduler thread (agent cadences)
#   - slack_listener thread (responds to @Nexa mentions)
#
# nexa-worker has been removed — it was a duplicate.
