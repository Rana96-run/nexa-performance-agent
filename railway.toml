[build]
builder = "NIXPACKS"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# ── Services ──────────────────────────────────────────────────────────────────
#
# Service 1: nexa-web  (existing)
#   Start command: python app_server.py
#   Runs: Flask API + operational_scheduler + slack_listener
#
# Service 2: nexa-dashboard  (add manually in Railway UI)
#   Start command (paste into Railway service settings):
#     streamlit run dashboard/app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
#   Same repo, same env vars.
#   Public URL → share with team.
