name: BQ Collectors — 6h refresh

# Runs every 6 hours: 00, 06, 12, 18 UTC = 03, 09, 15, 21 Riyadh.
# Each collector runs as an independent step so one failure does not block others.
# Manual trigger lets you run all collectors or a single named one.

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 03:00 Riyadh
    - cron: "0 6 * * *"   # 06:00 UTC = 09:00 Riyadh
    - cron: "0 12 * * *"  # 12:00 UTC = 15:00 Riyadh
    - cron: "0 18 * * *"  # 18:00 UTC = 21:00 Riyadh
  workflow_dispatch:
    inputs:
      collector:
        description: >
          Collector to run (leave blank to run all).
          Options: google_ads | meta | snapchat | tiktok | linkedin |
                   microsoft_ads | hubspot_leads | hubspot_deals |
                   youtube | ga4 | meta_organic | gsc | views | asana_sync
        required: false
        default: ""
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      # ── BigQuery ──────────────────────────────────────────────────────────────
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET: ${{ secrets.BQ_DATASET }}
      BQ_LOCATION: ${{ secrets.BQ_LOCATION }}
      # Credential JSON is written to disk in the "Bootstrap credentials" step;
      # GOOGLE_APPLICATION_CREDENTIALS is set via $GITHUB_ENV there.

      # ── Google Ads ────────────────────────────────────────────────────────────
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}

      # ── Meta (paid) ───────────────────────────────────────────────────────────
      META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
      META_AD_ACCOUNT_1: ${{ secrets.META_AD_ACCOUNT_1 }}
      META_AD_ACCOUNT_2: ${{ secrets.META_AD_ACCOUNT_2 }}

      # ── Meta (organic) ────────────────────────────────────────────────────────
      META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
      META_FB_PAGE_ID: ${{ secrets.META_FB_PAGE_ID }}
      META_IG_BUSINESS_ID: ${{ secrets.META_IG_BUSINESS_ID }}

      # ── Snapchat ──────────────────────────────────────────────────────────────
      SNAPCHAT_CLIENT_ID: ${{ secrets.SNAPCHAT_CLIENT_ID }}
      SNAPCHAT_CLIENT_SECRET: ${{ secrets.SNAPCHAT_CLIENT_SECRET }}
      SNAPCHAT_REFRESH_TOKEN: ${{ secrets.SNAPCHAT_REFRESH_TOKEN }}

      # ── TikTok ────────────────────────────────────────────────────────────────
      TIKTOK_ACCESS_TOKEN: ${{ secrets.TIKTOK_ACCESS_TOKEN }}
      TIKTOK_AD_ACCOUNT_2024: ${{ secrets.TIKTOK_AD_ACCOUNT_2024 }}
      TIKTOK_AD_ACCOUNT_2025: ${{ secrets.TIKTOK_AD_ACCOUNT_2025 }}

      # ── LinkedIn ──────────────────────────────────────────────────────────────
      LI_ACCESS_TOKEN: ${{ secrets.LI_ACCESS_TOKEN }}
      LI_AD_ACCOUNT_URN: ${{ secrets.LI_AD_ACCOUNT_URN }}
      LI_CLIENT_ID: ${{ secrets.LI_CLIENT_ID }}
      LI_CLIENT_SECRET: ${{ secrets.LI_CLIENT_SECRET }}
      LI_REFRESH_TOKEN: ${{ secrets.LI_REFRESH_TOKEN }}

      # ── Microsoft Ads (primary account) ──────────────────────────────────────
      MS_DEVELOPER_TOKEN: ${{ secrets.MS_DEVELOPER_TOKEN }}
      MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
      MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
      MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
      MS_CUSTOMER_ID: ${{ secrets.MS_CUSTOMER_ID }}
      MS_ACCOUNT_ID: ${{ secrets.MS_ACCOUNT_ID }}
      MS_REFRESH_TOKEN: ${{ secrets.MS_REFRESH_TOKEN }}
      # Microsoft Ads (secondary account — optional)
      MS_ACCOUNT_ID_2: ${{ secrets.MS_ACCOUNT_ID_2 }}
      MS_CUSTOMER_ID_2: ${{ secrets.MS_CUSTOMER_ID_2 }}
      MS_REFRESH_TOKEN_2: ${{ secrets.MS_REFRESH_TOKEN_2 }}

      # ── HubSpot ───────────────────────────────────────────────────────────────
      HUBSPOT_ACCESS_TOKEN: ${{ secrets.HUBSPOT_ACCESS_TOKEN }}

      # ── YouTube ───────────────────────────────────────────────────────────────
      YT_CLIENT_ID: ${{ secrets.YT_CLIENT_ID }}
      YT_CLIENT_SECRET: ${{ secrets.YT_CLIENT_SECRET }}
      YT_REFRESH_TOKEN: ${{ secrets.YT_REFRESH_TOKEN }}
      YT_CHANNEL_ID: ${{ secrets.YT_CHANNEL_ID }}

      # ── GA4 ───────────────────────────────────────────────────────────────────
      GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}

      # ── Slack ─────────────────────────────────────────────────────────────────
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}
      SLACK_CHANNEL_NOTIFY: ${{ secrets.SLACK_CHANNEL_NOTIFY }}
      SLACK_CHANNEL_APPROVAL: ${{ secrets.SLACK_CHANNEL_APPROVAL }}
      SLACK_CHANNEL_HEALTH: ${{ secrets.SLACK_CHANNEL_HEALTH }}

      # ── Asana ─────────────────────────────────────────────────────────────────
      ASANA_ACCESS_TOKEN: ${{ secrets.ASANA_ACCESS_TOKEN }}
      ASANA_PROJECT_DAILY_ACTIVITY: ${{ secrets.ASANA_PROJECT_DAILY_ACTIVITY }}
      ASANA_PROJECT_OPTIMIZATION: ${{ secrets.ASANA_PROJECT_OPTIMIZATION }}
      ASANA_PROJECT_SEASONAL: ${{ secrets.ASANA_PROJECT_SEASONAL }}

      # ── Anthropic ─────────────────────────────────────────────────────────────
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      # ── 2. Python ──────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Bootstrap Google credentials ───────────────────────────────────────
      # bootstrap.py reads GOOGLE_APPLICATION_CREDENTIALS_JSON and writes the file.
      # We replicate that here so every step in this job sees the credential path.
      - name: Bootstrap Google credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      # ── 5. Collectors (each step independent) ─────────────────────────────────
      # RUN_COLLECTOR is a helper: skip the step when a specific collector was
      # requested via workflow_dispatch and this is not it.
      # If no collector was specified (empty string) every step runs.

      - name: Collector — Google Ads
        id: google_ads
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'google_ads' }}
        continue-on-error: true
        run: python collectors/google_ads_bq.py all 35

      - name: Collector — Meta
        id: meta
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'meta' }}
        continue-on-error: true
        run: python collectors/meta_bq.py all 30

      - name: Collector — Snapchat
        id: snapchat
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'snapchat' }}
        continue-on-error: true
        run: python collectors/snap_bq.py all

      - name: Collector — TikTok
        id: tiktok
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'tiktok' }}
        continue-on-error: true
        run: python collectors/tiktok_bq.py all

      - name: Collector — LinkedIn
        id: linkedin
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'linkedin' }}
        continue-on-error: true
        run: python collectors/linkedin_bq.py all

      - name: Collector — Microsoft Ads
        id: microsoft_ads
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'microsoft_ads' }}
        continue-on-error: true
        run: python collectors/microsoft_ads_bq.py all

      - name: Collector — HubSpot Leads (cursor sync)
        id: hubspot_leads
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'hubspot_leads' }}
        continue-on-error: true
        run: python collectors/hubspot_leads_bq.py cursor

      - name: Collector — HubSpot Deals
        id: hubspot_deals
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'hubspot_deals' }}
        continue-on-error: true
        run: python collectors/hubspot_deals_bq.py mirror

      - name: Collector — YouTube
        id: youtube
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'youtube' }}
        continue-on-error: true
        run: python collectors/youtube_bq.py

      - name: Collector — GA4
        id: ga4
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'ga4' }}
        continue-on-error: true
        run: python collectors/ga4_bq.py --incremental

      - name: Collector — Meta Organic
        id: meta_organic
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'meta_organic' }}
        continue-on-error: true
        run: python collectors/meta_organic_bq.py

      - name: Collector — GSC organic search
        id: gsc
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'gsc' }}
        continue-on-error: true
        env:
          GSC_SITE_URL: ${{ secrets.GSC_SITE_URL }}
        run: python -m collectors.gsc_bq 3

      # ── 6. Views refresh ───────────────────────────────────────────────────────
      - name: Refresh BQ views
        id: views
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'views' }}
        continue-on-error: true
        run: python collectors/views.py

      # ── 7. Asana sync ──────────────────────────────────────────────────────────
      - name: Asana sync
        id: asana_sync
        timeout-minutes: 15
        if: ${{ inputs.collector == '' || inputs.collector == 'asana_sync' }}
        continue-on-error: true
        run: |
          python - <<'PYEOF'
          from collectors.asana_sync import run_full_sync
          n = run_full_sync()
          print(f"Asana sync complete: {n} rows")
          PYEOF

      # Step 8 (Report failures to Slack) removed 2026-06-18.
      # n8n Data Collection workflow (jOnJxdpdaO3Vbi0B) already alerts #data-health
      # on collector failures. This step was posting duplicates every 6h run.

# ──────────────────────────────────────────────────────────────────────────────
# SECRETS NEEDED IN GITHUB:
# Go to repo Settings → Secrets and variables → Actions → New repository secret
# Add each of these (copy values from Railway dashboard):
#
# BQ_PROJECT_ID
# BQ_DATASET
# BQ_LOCATION
# GOOGLE_APPLICATION_CREDENTIALS_JSON   ← full service-account JSON (one line)
#
# GOOGLE_ADS_DEVELOPER_TOKEN
# GOOGLE_ADS_CLIENT_ID
# GOOGLE_ADS_CLIENT_SECRET
# GOOGLE_ADS_REFRESH_TOKEN
#
# META_ACCESS_TOKEN
# META_AD_ACCOUNT_1
# META_AD_ACCOUNT_2
# META_PAGE_ACCESS_TOKEN
# META_FB_PAGE_ID
# META_IG_BUSINESS_ID
#
# SNAPCHAT_CLIENT_ID
# SNAPCHAT_CLIENT_SECRET
# SNAPCHAT_REFRESH_TOKEN
#
# TIKTOK_ACCESS_TOKEN
# TIKTOK_AD_ACCOUNT_2024
# TIKTOK_AD_ACCOUNT_2025
#
# LI_ACCESS_TOKEN
# LI_AD_ACCOUNT_URN
# LI_CLIENT_ID
# LI_CLIENT_SECRET
# LI_REFRESH_TOKEN
#
# MS_DEVELOPER_TOKEN
# MS_CLIENT_ID
# MS_CLIENT_SECRET
# MS_TENANT_ID
# MS_CUSTOMER_ID
# MS_ACCOUNT_ID
# MS_REFRESH_TOKEN
# MS_ACCOUNT_ID_2          (optional — secondary Bing account)
# MS_CUSTOMER_ID_2         (optional)
# MS_REFRESH_TOKEN_2       (optional)
#
# HUBSPOT_ACCESS_TOKEN
#
# YT_CLIENT_ID
# YT_CLIENT_SECRET
# YT_REFRESH_TOKEN
# YT_CHANNEL_ID
#
# GA4_PROPERTY_ID
#
# GSC_SITE_URL                  ← e.g. sc-domain:qoyod.com (service account must be granted GSC access)
#
# SLACK_BOT_TOKEN          (preferred — used for both collector alerts and Slack posting)
# SLACK_ACCESS_TOKEN       (legacy alias — keep in sync with SLACK_BOT_TOKEN)
# SLACK_CHANNEL_NOTIFY
# SLACK_CHANNEL_APPROVAL
# SLACK_CHANNEL_HEALTH
#
# ASANA_ACCESS_TOKEN
# ASANA_PROJECT_DAILY_ACTIVITY
# ASANA_PROJECT_OPTIMIZATION
# ASANA_PROJECT_SEASONAL
#
# ANTHROPIC_API_KEY
# ──────────────────────────────────────────────────────────────────────────────
