name: LinkedIn Token Refresh

# Refreshes the LinkedIn OAuth access token daily and writes it to BQ
# (platform_tokens table) so collectors/linkedin_bq.py always has a valid token
# without a Railway redeploy.
#
# LinkedIn token lifetimes:
#   access_token  — 60 days (renewed here)
#   refresh_token — 365 days (stored in Railway + GitHub secrets, never changed by this script)

on:
  schedule:
    - cron: "0 2 * * *"   # 02:00 UTC = 05:00 Riyadh — runs before the 03:00 collector run
  workflow_dispatch:        # manual trigger for immediate refresh

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # ── BigQuery ──────────────────────────────────────────────────────────────
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET: ${{ secrets.BQ_DATASET }}
      BQ_LOCATION: ${{ secrets.BQ_LOCATION }}

      # ── LinkedIn OAuth ────────────────────────────────────────────────────────
      LI_CLIENT_ID: ${{ secrets.LI_CLIENT_ID }}
      LI_CLIENT_SECRET: ${{ secrets.LI_CLIENT_SECRET }}
      LI_REFRESH_TOKEN: ${{ secrets.LI_REFRESH_TOKEN }}
      # Current access token (fallback if BQ write fails partway through)
      LI_ACCESS_TOKEN: ${{ secrets.LI_ACCESS_TOKEN }}

      # ── Slack (failure alerts) ────────────────────────────────────────────────
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_ACCESS_TOKEN: ${{ secrets.SLACK_ACCESS_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.4.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Bootstrap Google credentials
        run: |
          echo '${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}' > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Refresh LinkedIn token
        id: refresh
        run: python scripts/linkedin_refresh.py

      - name: Notify Slack on failure
        if: failure()
        env:
          RUN_URL: "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          python - <<'PYEOF'
          import os, requests

          token   = os.environ.get("SLACK_BOT_TOKEN") or os.environ.get("SLACK_ACCESS_TOKEN", "")
          channel = "C0ARMQKK8GK"   # #data-health
          run_url = os.environ.get("RUN_URL", "")

          if not token:
              print("SLACK_BOT_TOKEN not set — skipping Slack notification")
              raise SystemExit(0)

          text = (
              f":warning: *LinkedIn token refresh FAILED* — "
              f"LinkedIn collector will fall back to env-var token until fixed. "
              f"<{run_url}|View run>"
          )
          resp = requests.post(
              "https://slack.com/api/chat.postMessage",
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              json={"channel": channel, "text": text},
              timeout=10,
          )
          data = resp.json()
          if not data.get("ok"):
              print(f"Slack post failed: {data}")
          PYEOF

# ──────────────────────────────────────────────────────────────────────────────
# SECRETS NEEDED IN GITHUB (same repo secrets as collectors.yml):
#
# BQ_PROJECT_ID
# BQ_DATASET
# BQ_LOCATION
# GOOGLE_APPLICATION_CREDENTIALS_JSON
#
# LI_CLIENT_ID
# LI_CLIENT_SECRET
# LI_REFRESH_TOKEN
# LI_ACCESS_TOKEN               (fallback)
#
# SLACK_BOT_TOKEN
# SLACK_ACCESS_TOKEN            (legacy alias)
# ──────────────────────────────────────────────────────────────────────────────
